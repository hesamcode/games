<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff;
            overflow: hidden;
            direction: rtl;
        }
        #gameCanvas {
            border: 1px solid #000;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // تنظیمات اولیه
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;

        // رنگ‌ها
        const WHITE = "#FFFFFF";
        const BLACK = "#000000";
        const RED = "#C80000";
        const GRAY = "#969696";
        const DARK_GRAY = "#787878";
        const LIGHT_GRAY = "#C8C8C8";
        const SHADOW = "rgba(50, 50, 50, 0.4)";

        // متغیرهای بازی
        let carRadius = 30;
        let carX = WIDTH / 2;
        let carY = HEIGHT / 2 + 100;
        const carMaxSpeed = 4;
        const carAcceleration = 0.4;
        const carFriction = 0.04;
        let carAngle = 0;
        let carVelocityX = 0;
        let carVelocityY = 0;

        // مختصات پیست
        const trackCenterX = WIDTH / 2;
        const trackCenterY = HEIGHT / 2 - 120;
        const trackA = 180;
        const trackB = 250;
        const trackThickness = 50;
        const trackInnerA = trackA - trackThickness;
        const trackInnerB = trackB - trackThickness;
        const trackBorderThickness = 5;

        // جوی‌استیک
        const joystickCenter = { x: WIDTH / 2, y: HEIGHT - 120 };
        const joystickRadius = 75;
        const joystickHandleRadius = 30;
        let joystickActive = false;
        let joystickX = joystickCenter.x;
        let joystickY = joystickCenter.y;

        // توابع کمکی
        function getEllipseValue(x, y, a, b) {
            return ((x - trackCenterX) ** 2 / a ** 2) + ((y - trackCenterY) ** 2 / b ** 2);
        }

        function isInsideTrack(x, y) {
            const outerValue = getEllipseValue(x, y, trackA, trackB);
            const innerValue = getEllipseValue(x, y, trackInnerA, trackInnerB);
            return outerValue <= 1 && innerValue >= 1;
        }

        function handleCollision(newX, newY, oldX, oldY) {
            let velocity = { x: carVelocityX, y: carVelocityY };
            const speed = Math.hypot(velocity.x, velocity.y);
            if (speed === 0) return { x: oldX, y: oldY, vx: 0, vy: 0 };

            const outerValue = getEllipseValue(newX, newY, trackA, trackB);
            const innerValue = getEllipseValue(newX, newY, trackInnerA, trackInnerB);

            let normal;
            if (outerValue > 1) {
                const dx = 2 * (newX - trackCenterX) / (trackA ** 2);
                const dy = 2 * (newY - trackCenterY) / (trackB ** 2);
                normal = { x: dx, y: dy };
            } else if (innerValue < 1) {
                const dx = 2 * (newX - trackCenterX) / (trackInnerA ** 2);
                const dy = 2 * (newY - trackCenterY) / (trackInnerB ** 2);
                normal = { x: -dx, y: -dy };
            } else {
                return { x: newX, y: newY, vx: carVelocityX, vy: carVelocityY };
            }

            const normalLength = Math.hypot(normal.x, normal.y);
            normal.x /= normalLength;
            normal.y /= normalLength;

            const dotProduct = velocity.x * normal.x + velocity.y * normal.y;
            const velocityTangent = {
                x: velocity.x - dotProduct * normal.x,
                y: velocity.y - dotProduct * normal.y
            };
            const velocityNormal = { x: dotProduct * normal.x, y: dotProduct * normal.y };

            const newVelocity = {
                x: velocityTangent.x * 0.95 - velocityNormal.x * 0.3,
                y: velocityTangent.y * 0.95 - velocityNormal.y * 0.3
            };

            let correctedX = newX;
            let correctedY = newY;
            const correctionFactor = carRadius * 0.1;
            while (!isInsideTrack(correctedX, correctedY)) {
                correctedX -= normal.x * correctionFactor;
                correctedY -= normal.y * correctionFactor;
            }

            return { x: correctedX, y: correctedY, vx: newVelocity.x, vy: newVelocity.y };
        }

        // کنترل جوی‌استیک با لمس (موبایل) و ماوس (دسکتاپ)
        function updateJoystickPosition(x, y) {
            const dx = x - joystickCenter.x;
            const dy = y - joystickCenter.y;
            const distance = Math.hypot(dx, dy);
            if (distance > joystickRadius) {
                const angle = Math.atan2(dy, dx);
                joystickX = joystickCenter.x + Math.cos(angle) * joystickRadius;
                joystickY = joystickCenter.y + Math.sin(angle) * joystickRadius;
            } else {
                joystickX = x;
                joystickY = y;
            }
        }

        // رویدادهای ماوس
        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const distance = Math.hypot(mx - joystickCenter.x, my - joystickCenter.y);
            if (distance <= joystickRadius) {
                joystickActive = true;
                updateJoystickPosition(mx, my);
            }
        });

        canvas.addEventListener("mousemove", (e) => {
            if (joystickActive) {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                updateJoystickPosition(mx, my);
            }
        });

        canvas.addEventListener("mouseup", () => {
            joystickActive = false;
            joystickX = joystickCenter.x;
            joystickY = joystickCenter.y;
        });

        // رویدادهای لمسی برای موبایل
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const mx = touch.clientX - rect.left;
            const my = touch.clientY - rect.top;
            const distance = Math.hypot(mx - joystickCenter.x, my - joystickCenter.y);
            if (distance <= joystickRadius) {
                joystickActive = true;
                updateJoystickPosition(mx, my);
            }
        });

        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            if (joystickActive) {
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const mx = touch.clientX - rect.left;
                const my = touch.clientY - rect.top;
                updateJoystickPosition(mx, my);
            }
        });

        canvas.addEventListener("touchend", () => {
            joystickActive = false;
            joystickX = joystickCenter.x;
            joystickY = joystickCenter.y;
        });

        // حلقه اصلی بازی
        function gameLoop() {
            // حرکت ماشین
            if (joystickActive) {
                const dx = joystickX - joystickCenter.x;
                const dy = joystickY - joystickCenter.y;
                const distance = Math.hypot(dx, dy);
                if (distance > 0) {
                    const angle = Math.atan2(dy, dx);
                    const accelFactor = Math.min(distance / joystickRadius, 1);
                    carVelocityX += Math.cos(angle) * carAcceleration * accelFactor;
                    carVelocityY += Math.sin(angle) * carAcceleration * accelFactor;
                    const targetAngle = (angle * 180 / Math.PI) - 90;
                    let angleDiff = (targetAngle - carAngle) % 360;
                    if (angleDiff > 180) angleDiff -= 360;
                    carAngle += angleDiff * 0.15;
                }
            } else {
                carVelocityX *= (1 - carFriction);
                carVelocityY *= (1 - carFriction);
            }

            const speed = Math.hypot(carVelocityX, carVelocityY);
            if (speed > carMaxSpeed) {
                carVelocityX = carVelocityX * carMaxSpeed / speed;
                carVelocityY = carVelocityY * carMaxSpeed / speed;
            }

            const newCarX = carX + carVelocityX;
            const newCarY = carY + carVelocityY;
            const collisionResult = handleCollision(newCarX, newCarY, carX, carY);
            carX = collisionResult.x;
            carY = collisionResult.y;
            carVelocityX = collisionResult.vx;
            carVelocityY = collisionResult.vy;

            // رسم صفحه
            ctx.fillStyle = WHITE;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // رسم پیست
            ctx.beginPath();
            ctx.ellipse(trackCenterX, trackCenterY, trackA, trackB, 0, 0, Math.PI * 2);
            ctx.fillStyle = LIGHT_GRAY;
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(trackCenterX, trackCenterY, trackInnerA, trackInnerB, 0, 0, Math.PI * 2);
            ctx.fillStyle = WHITE;
            ctx.fill();
            ctx.lineWidth = trackBorderThickness;
            ctx.strokeStyle = DARK_GRAY;
            ctx.beginPath();
            ctx.ellipse(trackCenterX, trackCenterY, trackA, trackB, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(trackCenterX, trackCenterY, trackInnerA, trackInnerB, 0, 0, Math.PI * 2);
            ctx.stroke();

            // رسم سایه ماشین
            ctx.beginPath();
            ctx.ellipse(carX + 5, carY + 5, carRadius, carRadius, 0, 0, Math.PI * 2);
            ctx.fillStyle = SHADOW;
            ctx.fill();

            // رسم ماشین
            ctx.save();
            ctx.translate(carX, carY);
            ctx.rotate((carAngle * Math.PI) / 180);
            ctx.fillStyle = RED;
            ctx.fillRect(-10, -20, 20, 40);
            ctx.fillStyle = BLACK;
            ctx.beginPath();
            ctx.arc(-10, -20, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(10, -20, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-10, 20, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(10, 20, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // رسم جوی‌استیک
            ctx.beginPath();
            ctx.arc(joystickCenter.x, joystickCenter.y, joystickRadius, 0, Math.PI * 2);
            ctx.strokeStyle = GRAY;
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(joystickX, joystickY, joystickHandleRadius, 0, Math.PI * 2);
            ctx.fillStyle = RED;
            ctx.fill();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        // خروج با کلید Escape (فقط برای دسکتاپ)
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") window.close();
        });
    </script>
</body>
</html>
